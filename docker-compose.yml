services:
  db:
    image: postgres:16-alpine
    container_name: rhumb-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "54322:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - rhumb_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: rhumb-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - rhumb_redis_data:/data

volumes:
  rhumb_pg_data:
  rhumb_redis_data:
