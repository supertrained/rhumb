[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rhumb"
version = "0.0.1"
description = "Agent-native tool discovery and scoring"
requires-python = ">=3.12"
dependencies = [
  "typer>=0.12.5",
  "httpx>=0.27.2"
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3.3",
  "mypy>=1.11.2",
  "black>=24.8.0",
  "ruff>=0.6.9"
]

[project.scripts]
rhumb = "main:app"

[tool.setuptools]
py-modules = ["main", "client", "formatting", "config"]

[tool.setuptools.packages.find]
where = ["."]
include = ["commands*"]
